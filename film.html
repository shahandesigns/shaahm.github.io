<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Film - Shahan Ahmed Design Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Qaranta';
            src: url('https://fonts.cdnfonts.com/s/93849/Qaranta.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        :root {
            color-scheme: light;
            --color-bg: #fafaf8;
            --color-text: #1a1a1a;
            --color-accent: #2d2d2d;
            --color-subtle: #858585;
            --color-border: #e0e0dc;
            --font-display: 'Playfair Display', serif;
            --font-logo: 'Qaranta', serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #fafaf8;
                --color-text: #1a1a1a;
                --color-accent: #2d2d2d;
                --color-subtle: #858585;
                --color-border: #e0e0dc;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(250, 250, 248, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-family: var(--font-logo);
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 0.05em;
            text-decoration: none;
            color: var(--color-text);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Dropdown menu */
        .nav-item {
            position: relative;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(250, 250, 248, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 1rem 0;
            margin-top: 1rem;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, margin-top 0.3s ease;
            z-index: 1001;
        }

        .nav-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            margin-top: 0.5rem;
        }

        .dropdown a {
            display: block;
            padding: 0.75rem 1.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text);
            text-decoration: none;
            transition: background 0.3s ease, color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dropdown a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(45, 45, 45, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .dropdown a:hover::before {
            left: 100%;
        }

        .dropdown a:hover {
            background: rgba(224, 224, 220, 0.3);
            color: var(--color-accent);
        }

        .dropdown a::after {
            display: none;
        }

        /* Hero Section */
        .hero {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 3rem 4rem;
            position: relative;
            overflow: hidden;
        }

        /* Particle Background */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            border-radius: 50%;
        }

        .hero-content {
            max-width: 900px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.2s both;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-subtle);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        /* Film Grid */
        .films {
            padding: 6rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .films-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 4rem;
        }

        .film-card {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .film-card:nth-child(1) { animation-delay: 0.1s; }
        .film-card:nth-child(2) { animation-delay: 0.2s; }
        .film-card:nth-child(3) { animation-delay: 0.3s; }
        .film-card:nth-child(4) { animation-delay: 0.4s; }

        .film-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--color-border);
            margin-bottom: 1.5rem;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .film-video iframe {
            width: 100%;
            height: 100%;
        }

        /* Image Gallery */
        .image-gallery {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-gallery:hover .gallery-nav {
            opacity: 1;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        .gallery-image.active {
            opacity: 1;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 0.5rem;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-btn {
            background: rgba(250, 250, 248, 0.85);
            border: 1px solid rgba(224, 224, 220, 0.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: var(--color-text);
        }

        .gallery-btn:hover {
            background: rgba(250, 250, 248, 1);
            border-color: var(--color-border);
            transform: scale(1.1);
        }

        .gallery-dots {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(250, 250, 248, 0.5);
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-dot.active {
            background: var(--color-bg);
            transform: scale(1.3);
        }

        .film-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .film-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .film-year {
            font-size: 0.75rem;
            color: var(--color-subtle);
            letter-spacing: 0.1em;
        }

        .film-description {
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--color-subtle);
        }

        /* Footer */
        footer {
            padding: 4rem 3rem;
            text-align: center;
            border-top: 1px solid var(--color-border);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-subtle);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 2rem;
            }

            .nav-links {
                gap: 1.5rem;
                font-size: 0.65rem;
            }

            .hero {
                padding: 6rem 2rem 4rem;
            }

            .films-grid {
                grid-template-columns: 1fr;
                gap: 3rem;
            }

            .films {
                padding: 4rem 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="portfolio.html" class="logo">Shahan Ahmed</a>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="portfolio.html#work">Work</a>
                <div class="dropdown">
                    <a href="portfolio.html#work">Featured</a>
                    <a href="film.html">Film</a>
                    <a href="concept-art.html">Concept Art</a>
                    <a href="logo-design.html">Logo Design</a>

            </li>
            <li><a href="portfolio.html#about">About</a></li>
            <li><a href="portfolio.html#contact">Contact</a></li>

    <!-- Hero Section -->
    <section class="hero">

        <div class="particles" id="particles"></div>

                <div class="film-video">
                    <iframe

    <script>
        // Particle system - same as portfolio page
        const particlesContainer = document.getElementById('particles');
        const particleCount = 200;
        const particles = [];

        class Particle {
            constructor(index) {
                this.element = document.createElement('div');
                this.element.className = 'particle';
                this.index = index;
                this.reset();
                particlesContainer.appendChild(this.element);
            }

            reset() {
                const hero = document.querySelector('.hero');
                const heroWidth = hero.offsetWidth;
                const heroHeight = hero.offsetHeight;
                
                this.baseX = Math.random() * heroWidth;
                this.baseY = Math.random() * heroHeight;
                
                this.driftVelocityX = (Math.random() - 0.5) * 0.02;
                this.driftVelocityY = (Math.random() - 0.5) * 0.02;
                
                this.lifetime = 0;
                this.maxLifetime = 600 + Math.random() * 400;
                
                this.x = this.baseX;
                this.y = this.baseY;
                
                this.waveOffset = (this.baseX / heroWidth) * Math.PI * 2 + (this.baseY / heroHeight) * Math.PI;
                this.waveSpeed = 0.005;
                this.waveAmplitude = 20 + Math.random() * 10;
                this.wavePhase = 0.7;
                
                this.sparkleSpeed = Math.random() * 0.008 + 0.005;
                this.sparkleOffset = Math.random() * Math.PI * 2;
                this.baseOpacity = Math.random() * 0.2 + 0.5;
                this.sparkleIntensity = Math.random() * 0.3 + 0.3;
                
                const r = Math.floor(Math.random() * 120 + 30);
                const g = Math.floor(Math.random() * 150 + 100);
                const b = Math.floor(Math.random() * 100 + 180);
                this.element.style.background = `rgb(${r}, ${g}, ${b})`;
                
                this.updatePosition();
            }

            updatePosition() {
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
            }

            update(time, mouseX, mouseY) {
                this.lifetime++;
                
                if (this.lifetime > this.maxLifetime) {
                    this.reset();
                    return;
                }
                
                const lifetimeProgress = this.lifetime / this.maxLifetime;
                const fadeFactor = 1 - Math.pow(lifetimeProgress, 2);
                
                this.baseX += this.driftVelocityX;
                this.baseY += this.driftVelocityY;
                
                const wave1 = Math.sin(time * this.waveSpeed + this.waveOffset) * this.waveAmplitude;
                const wave2 = Math.cos(time * this.waveSpeed * this.wavePhase + this.waveOffset * 1.3) * this.waveAmplitude * 0.5;
                
                const sparkle = (Math.sin(time * this.sparkleSpeed + this.sparkleOffset) + 1) / 2;
                const currentOpacity = (this.baseOpacity + (sparkle * this.sparkleIntensity)) * fadeFactor;
                
                const dx = mouseX - this.baseX;
                const dy = mouseY - this.baseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const angleToMouse = Math.atan2(dy, dx);
                const normalizedDistance = Math.min(distance / 300, 1);
                
                const r = Math.floor(Math.abs(Math.cos(angleToMouse) * 150 * (1 - normalizedDistance)) + 50);
                const g = Math.floor(Math.abs(Math.sin(angleToMouse + Math.PI / 3) * 150 * (1 - normalizedDistance)) + 100);
                const b = Math.floor(Math.abs(Math.sin(angleToMouse) * 100 * (1 - normalizedDistance)) + 180);
                
                this.element.style.background = `rgb(${r}, ${g}, ${b})`;
                
                let mouseInfluenceX = 0;
                let mouseInfluenceY = 0;
                
                if (distance < 200 && distance > 0) {
                    const force = (200 - distance) / 200;
                    mouseInfluenceX = -(dx / distance) * force * 50;
                    mouseInfluenceY = -(dy / distance) * force * 50;
                }
                
                this.x = this.baseX + wave1 + wave2 + mouseInfluenceX;
                this.y = this.baseY + wave1 * 0.5 - wave2 * 0.8 + mouseInfluenceY;
                
                this.element.style.opacity = currentOpacity;
                
                this.updatePosition();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        let mouseX = -1000;
        let mouseY = -1000;
        let lastMouseMove = Date.now();
        let particlesActive = true;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            lastMouseMove = Date.now();
            
            if (!particlesActive) {
                particlesActive = true;
                particles.forEach(particle => {
                    particle.element.style.transition = '';
                });
            }
        });

        setInterval(() => {
            const timeSinceMove = Date.now() - lastMouseMove;
            if (timeSinceMove > 3000 && particlesActive) {
                particlesActive = false;
                particles.forEach(particle => {
                    particle.element.style.transition = 'opacity 2s ease-out';
                    particle.element.style.opacity = '0';
                });
            }
        }, 100);

        let time = 0;
        function animate() {
            time++;
            particles.forEach(particle => {
                particle.update(time, mouseX, mouseY);
            });
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            particles.forEach((particle, index) => {
                particle.index = index;
                particle.reset();
            });
        });
    </script>
